<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>なかよしルーレット｜Love Touch</title>
    
    <meta property="og:title" content="なかよしルーレット">
    <meta property="og:description" content="二人の仲直りを応援する、魔法のルーレット。">
    <meta property="og:type" content="website">
    
    <style>
        body {
            background-color: #ffebf0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #d63384;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 35px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 3px solid #ffb6c1;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            color: #ff69b4;
        }

        .heart-animation {
            font-size: 45px;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        #result-display {
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            margin: 20px 0;
            padding: 20px;
            border-radius: 20px;
            background: linear-gradient(145deg, #fff5f7, #ffffff);
            border: 2px dashed #ffc0cb;
            line-height: 1.5;
            color: #ff4081;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            border: none;
            padding: 16px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            width: 100%;
        }

        .spin-btn {
            background: linear-gradient(45deg, #ff69b4, #ff85a1);
            color: white;
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.4);
        }

        .spin-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 10px rgba(255, 105, 180, 0.4);
        }

        .line-btn {
            background-color: #06C755;
            color: white;
            font-size: 15px;
            text-decoration: none;
            display: none; /* 初期は非表示 */
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .line-btn.show {
            display: flex;
            opacity: 1;
        }

        .desc {
            font-size: 12px;
            margin-top: 15px;
            color: #ffb6c1;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="heart-animation">💖</div>
    <h1>なかよしルーレット</h1>
    <p style="font-size: 14px; margin: 0;">体温で、トゲトゲした心を溶か
