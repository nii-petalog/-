<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>なかよしルーレット｜Love Touch</title>
    
    <meta property="og:title" content="なかよしルーレット">
    <meta property="og:description" content="二人の仲直りを応援する、魔法のルーレット。">
    <meta property="og:type" content="website">
    
    <style>
        /* スマホ画面にぴったり収まるように調整 */
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden; /* スクロールさせない */
        }

        body {
            background-color: #ffebf0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #d63384;
        }

        .container {
            background-color: white;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
            text-align: center;
            width: 85%;
            max-width: 350px;
            border: 3px solid #ffb6c1;
        }

        h1 {
            font-size: 20px;
            margin: 5px 0;
            color: #ff69b4;
        }

        .heart-animation {
            font-size: 40px;
            margin-bottom: 5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        #result-display {
            height: 120px; /* 少し短くして収まりやすく */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 17px;
            font-weight: bold;
            margin: 15px 0;
            padding: 15px;
            border-radius: 15px;
            background: #fffafb;
            border: 2px dashed #ffc0cb;
            line-height: 1.4;
            color: #ff4081;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            border: none;
            padding: 14px;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        .spin-btn {
            background: linear-gradient(45deg, #ff69b4, #ff85a1);
            color: white;
            box-shadow: 0 4px 10px rgba(255, 105, 180, 0.3);
        }

        .line-btn {
            background-color: #06C755;
            color: white;
            display: none;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .line-btn.show {
            display: flex;
        }

        .desc {
            font-size: 11px;
            margin-top: 10px;
            color: #ffb6c1;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="heart-animation">💖</div>
    <h1>なかよしルーレット</h1>
    <p style="font-size: 12px; margin: 0;">体温で、トゲトゲした心を溶かそう</p>
    
    <div id="result-display">
        準備ができたら<br>ボタンを押してね
    </div>

    <div class="btn-group">
        <button class="spin-btn" onclick="spinRoulette()">愛のきっかけを作る</button>
        <button id="line-share" class="line-btn" onclick="shareLine()">結果を相手に送る 💬</button>
    </div>

    <div class="desc">
        ※ふたりの幸せを応援しています
    </div>
</div>

<script>
    let currentResult = "";
    const methods = [
        "何も言わずに、相手の体温を感じるまでぎゅーっとハグする",
        "「仲直りのチューしよ？」と可愛くおねだりしてみる",
        "相手の隣に座って、そっと肩に頭を乗せてみる",
        "相手の手を両手で包み込んで、じっと目を見つめる",
        "後ろからお腹のあたりを優しくバックハグする",
        "相手の頬にそっと触れてから、優しくキスをする",
        "指を絡める「恋人繋ぎ」をして、そのまま離さない",
        "「ごめんね」と言いながら、相手の腕にすり寄ってみる",
        "相手の膝枕をしてもらうか、相手を膝枕してあげる",
        "頭をポンポンするか、よしよしして甘えさせてあげる"
    ];

    function spinRoulette() {
        const display = document.getElementById('result-display');
        const lineBtn = document.getElementById('line-share');
        lineBtn.classList.remove('show');
        
        let count = 0;
        const interval = setInterval(() => {
            const tempIndex = Math.floor(Math.random() * methods.length);
            display.innerText = methods[tempIndex];
            count++;
            
            if (count > 12) {
                clearInterval(interval);
                const finalIndex = Math.floor(Math.random() * methods.length);
                currentResult = methods[finalIndex];
                display.innerHTML = "✨ " + currentResult + " ✨";
                lineBtn.classList.add('show');
            }
        }, 60);
    }

    function shareLine() {
        if (!currentResult) return;
        const text = "【なかよしルーレット】\n「" + currentResult + "」\n\nこれやっていい？仲直りしたいです。";
        const url = "https://line.me/R/msg/text/?" + encodeURIComponent(text);
        window.location.href = url;
    }
</script>

</body>
</html>
